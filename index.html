<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frota Protegida – Onboarding</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --orange:        #F58A4B;
  --orange-dark:   #D4641A;
  --orange-light:  #FFF5EF;
  --orange-border: #FDDCC4;
  --text-1: #111118;
  --text-2: #52526A;
  --text-3: #9898B0;
  --border: #E8E8F2;
  --bg:     #F2F3F8;
  --card:   #FFFFFF;
  --green:       #16A34A;
  --green-bg:    #F0FDF4;
  --green-border:#BBF7D0;
  --red:         #DC2626;
  --red-bg:      #FEF2F2;
  --red-border:  #FECACA;
  --blue:        #4F46E5;
  --blue-bg:     #EEF2FF;
  --blue-border: #C7D2FE;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text-1);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 36px 20px 80px;
}

/* ── SHELL ─────────────────────────────────────── */
.shell {
  width: 100%;
  max-width: 780px;
  display: flex;
  flex-direction: column;
}

/* ── TOP NAV ───────────────────────────────────── */
.topnav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 36px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 14px;
  font-weight: 800;
  color: var(--text-1);
}
.brand-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--orange);
  animation: pulse-dot 2s infinite;
}
.skip-btn {
  font-size: 12px; color: var(--text-3);
  background: none; border: none;
  font-family: 'Inter', sans-serif;
  cursor: pointer; padding: 4px 8px;
  border-radius: 6px;
  transition: color .15s, background .15s;
}
.skip-btn:hover { color: var(--text-2); background: var(--border); }

/* ── PROGRESS ──────────────────────────────────── */
.progress-wrap { margin-bottom: 32px; }
.progress-top  {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.progress-label {
  font-size: 11px; font-weight: 700;
  letter-spacing: .07em; text-transform: uppercase;
  color: var(--orange);
}
.progress-count { font-size: 11px; color: var(--text-3); }
.progress-track {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 14px;
}
.progress-fill {
  height: 100%;
  background: var(--orange);
  border-radius: 2px;
  transition: width .6s cubic-bezier(.4,0,.2,1);
}
.step-dots { display: flex; gap: 5px; }
.step-dot {
  height: 3px; border-radius: 2px;
  background: var(--border);
  transition: width .4s cubic-bezier(.4,0,.2,1), background .3s;
  width: 20px;
}
.step-dot.done   { background: var(--orange-border); }
.step-dot.active { background: var(--orange); width: 38px; }

/* ── ANIMATIONS ────────────────────────────────── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes popIn {
  from { opacity:0; transform:scale(.7) translateY(12px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}
@keyframes slideIn {
  from { opacity:0; transform:translateX(28px); }
  to   { opacity:1; transform:translateX(0); }
}
@keyframes slideInBack {
  from { opacity:0; transform:translateX(-28px); }
  to   { opacity:1; transform:translateX(0); }
}
@keyframes slideOut {
  from { opacity:1; transform:translateX(0); }
  to   { opacity:0; transform:translateX(-24px); }
}
@keyframes pulse-dot {
  0%,100% { box-shadow:0 0 0 0 rgba(245,138,75,.4); }
  50%      { box-shadow:0 0 0 6px rgba(245,138,75,0); }
}
@keyframes pulse-cta {
  0%,100% { box-shadow:0 4px 20px rgba(245,138,75,.4); }
  50%      { box-shadow:0 4px 32px rgba(245,138,75,.6); }
}
@keyframes countUp {
  0%   { content:"0"; }
  100% { content:attr(data-val); }
}
@keyframes drawCheck {
  from { stroke-dashoffset: 30; }
  to   { stroke-dashoffset: 0; }
}
@keyframes barFill {
  from { transform: scaleX(0); }
  to   { transform: scaleX(1); }
}

/* stagger */
.a1 { opacity:0; animation: fadeUp .5s cubic-bezier(.22,.68,0,1.1) .05s forwards; }
.a2 { opacity:0; animation: fadeUp .5s cubic-bezier(.22,.68,0,1.1) .14s forwards; }
.a3 { opacity:0; animation: fadeUp .5s cubic-bezier(.22,.68,0,1.1) .23s forwards; }
.a4 { opacity:0; animation: fadeUp .5s cubic-bezier(.22,.68,0,1.1) .32s forwards; }
.a5 { opacity:0; animation: fadeUp .5s cubic-bezier(.22,.68,0,1.1) .41s forwards; }
.a6 { opacity:0; animation: fadeUp .5s cubic-bezier(.22,.68,0,1.1) .50s forwards; }
.pop { opacity:0; animation: popIn .6s cubic-bezier(.22,.68,0,1.4) forwards; }

/* content transition */
.step-content { display: flex; flex-direction: column; gap: 8px; }
.step-content.out      { animation: slideOut .22s ease forwards; pointer-events:none; }
.step-content.in       { animation: slideIn  .36s cubic-bezier(.22,.68,0,1) forwards; }
.step-content.in-back  { animation: slideInBack .36s cubic-bezier(.22,.68,0,1) forwards; }

/* ── SHARED ELEMENTS ───────────────────────────── */
.step-headline {
  font-size: 26px; font-weight: 800;
  color: var(--text-1);
  letter-spacing: -.025em;
  line-height: 1.15;
  margin-bottom: 0;
}
.step-sub {
  font-size: 14px; color: var(--text-2);
  line-height: 1.6;
  max-width: 100%;
  margin-bottom: 0;
}
.card {
  background: var(--card);
  border-radius: 14px;
  border: 1px solid var(--border);
}
.tag {
  display: inline-block;
  font-size: 10px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  padding: 4px 10px; border-radius: 20px;
  margin-bottom: 20px;
}
.tag-warn { background: var(--red-bg);   color: var(--red);    border: 1px solid var(--red-border); }
.tag-ok   { background: var(--green-bg); color: var(--green);  border: 1px solid var(--green-border); }
.tag-blue { background: var(--blue-bg);  color: var(--blue);   border: 1px solid var(--blue-border); }
.tag-orange { background: var(--orange-light); color: var(--orange-dark); border: 1px solid var(--orange-border); }

/* big number hero */
.hero-number {
  font-size: 80px; font-weight: 900;
  letter-spacing: -.04em; line-height: 1;
  margin-bottom: 6px;
}
.hero-number.orange { color: var(--orange); }
.hero-number.red    { color: var(--red); }
.hero-number.green  { color: var(--green); }
.hero-number.dark   { color: var(--text-1); }

/* ── NAV BAR ───────────────────────────────────── */
.nav-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 32px;
}
.btn-back {
  display: flex; align-items: center; gap: 7px;
  background: none; border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 20px;
  font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 600;
  color: var(--text-2); cursor: pointer;
  transition: background .15s, color .15s;
}
.btn-back:hover { background: var(--border); color: var(--text-1); }
.btn-back:disabled { opacity: .3; pointer-events: none; }
.btn-next {
  display: flex; align-items: center; gap: 8px;
  background: var(--orange); border: none;
  border-radius: 10px; padding: 14px 26px;
  font-family: 'Inter', sans-serif;
  font-size: 14px; font-weight: 700;
  color: #fff; cursor: pointer;
  transition: background .15s, transform .1s;
  animation: pulse-cta 2.5s infinite;
}
.btn-next:hover  { background: var(--orange-dark); transform: translateY(-1px); }
.btn-next:active { transform: translateY(0); }
.btn-next.finish { background: var(--green); animation: none; box-shadow: 0 4px 20px rgba(22,163,74,.3); }
.btn-next.finish:hover { background: #15803D; }

/* ──────────────────────────────────────────────────
   STEP 1 · O PROBLEMA
────────────────────────────────────────────────── */
.s1-main-card {
  padding: 0;
  margin-bottom: 0;
  border: 1.5px solid var(--red-border);
  background: #fff;
  overflow: hidden;
}
.s1-card-top {
  padding: 32px 32px 24px;
}
.s1-number-block {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin: 16px 0 14px;
}
.s1-big-num {
  font-size: 100px; font-weight: 900;
  color: var(--red); letter-spacing: -.05em; line-height: 1;
  opacity: 0;
  animation: popIn .65s cubic-bezier(.22,.68,0,1.4) .28s forwards;
}
.s1-num-label {
  font-size: 22px; font-weight: 700;
  color: var(--text-2); letter-spacing: -.01em;
  padding-bottom: 10px;
}
.s1-supporting {
  font-size: 14px; color: var(--text-2);
  line-height: 1.65; max-width: 100%;
}
.s1-impact-band {
  background: var(--red-bg);
  border-top: 1px solid var(--red-border);
  padding: 18px 32px;
  display: flex; align-items: center; gap: 16px;
}
.s1-impact-num {
  font-size: 30px; font-weight: 900; color: var(--red);
  letter-spacing: -.03em; line-height: 1; flex-shrink: 0;
  white-space: nowrap;
}
.s1-impact-icon { font-size: 18px; flex-shrink: 0; }
.s1-impact-text {
  font-size: 13px; color: var(--red);
  font-weight: 500; line-height: 1.5;
}
.s1-impact-text strong { font-weight: 700; }

/* ──────────────────────────────────────────────────
   STEP 2 · AUTOMAÇÃO
────────────────────────────────────────────────── */
.s2-compare {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid var(--border);
  margin-bottom: 12px;
}
.s2-col {
  padding: 24px;
}
.s2-col.before {
  background: #FAFAFA;
  border-right: 1px solid var(--border);
}
.s2-col.after {
  background: var(--green-bg);
}
.s2-col-title {
  font-size: 11px; font-weight: 700;
  letter-spacing: .07em; text-transform: uppercase;
  margin-bottom: 16px;
}
.s2-col.before .s2-col-title { color: var(--text-3); }
.s2-col.after  .s2-col-title { color: var(--green); }
.s2-row {
  display: flex; align-items: flex-start;
  gap: 9px; margin-bottom: 12px;
  font-size: 13px;
}
.s2-row:last-child { margin-bottom: 0; }
.s2-row-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.s2-row-text { color: var(--text-2); line-height: 1.4; }
.s2-col.after .s2-row-text { color: var(--text-1); font-weight: 500; }

.s2-example-card {
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.s2-ex-left {
  flex-shrink: 0;
}
.s2-ex-number {
  font-size: 48px; font-weight: 900;
  color: var(--orange); letter-spacing: -.03em;
  line-height: 1;
}
.s2-ex-label {
  font-size: 12px; color: var(--text-3);
  font-weight: 500; margin-top: 2px;
}
.s2-ex-divider {
  width: 1px; height: 64px;
  background: var(--border); flex-shrink: 0;
}
.s2-checks { display: flex; flex-direction: column; gap: 8px; }
.s2-check-row {
  display: flex; align-items: center; gap: 9px;
  font-size: 13px; font-weight: 500; color: var(--text-1);
  opacity: 0;
  animation: fadeIn .4s ease forwards;
}
.s2-check-circle {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--green-bg); border: 1.5px solid var(--green-border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.s2-check-circle svg {
  stroke-dasharray: 30;
  stroke-dashoffset: 30;
  animation: drawCheck .4s ease forwards;
}

/* Step 2 — stat banner */
.s2-stat-banner {
  padding: 22px 28px;
  display: flex; align-items: center; gap: 20px;
  background: linear-gradient(135deg, var(--green-bg) 0%, #fff 100%);
  border-color: var(--green-border);
}
.s2-stat-num {
  font-size: 52px; font-weight: 900;
  color: var(--green); letter-spacing: -.03em;
  line-height: 1; flex-shrink: 0;
}
.s2-stat-desc {
  font-size: 15px; font-weight: 600;
  color: var(--text-1); line-height: 1.4;
}

/* ──────────────────────────────────────────────────
   STEP 3 · ROI
────────────────────────────────────────────────── */
.s3-comparison {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}
.s3-col {
  padding: 22px;
  border-radius: 14px;
  border: 1px solid var(--border);
}
.s3-col.without {
  background: #FAFAFA;
}
.s3-col.with {
  background: var(--green-bg);
  border-color: var(--green-border);
}
.s3-col-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: .07em; text-transform: uppercase;
  margin-bottom: 10px;
}
.s3-col.without .s3-col-label { color: var(--text-3); }
.s3-col.with    .s3-col-label { color: var(--green); }
.s3-amount {
  font-size: 32px; font-weight: 800;
  letter-spacing: -.02em; line-height: 1;
  margin-bottom: 8px;
}
.s3-col.without .s3-amount { color: var(--text-3); text-decoration: line-through; }
.s3-col.with    .s3-amount { color: var(--text-1); }
.s3-desc {
  font-size: 12px; color: #797979;
  line-height: 1.4;
}

.s3-savings-card {
  padding: 24px 28px;
  background: linear-gradient(135deg, var(--orange-light) 0%, #FFF0E0 100%);
  border: 1.5px solid var(--orange-border);
  display: flex;
  align-items: center;
  gap: 20px;
}
.s3-hero-savings {
  padding: 32px 32px;
  text-align: center;
  background: linear-gradient(135deg, var(--orange-light) 0%, #FFF0E0 100%);
  border: 1.5px solid var(--orange-border);
}
.s3-hero-amount {
  font-size: 64px; font-weight: 900;
  color: var(--orange-dark); letter-spacing: -.04em;
  line-height: 1; margin: 8px 0 6px;
}
.s3-compare-title {
  font-size: 13px; font-weight: 600; color: var(--text-2);
  margin-top: 4px;
}
.s3-compare-title strong { color: var(--text-1); font-weight: 800; }
.s3-savings-left { flex: 1; }
.s3-savings-label {
  font-size: 12px; font-weight: 600;
  color: var(--orange-dark); margin-bottom: 4px;
  text-transform: uppercase; letter-spacing: .05em;
}
.s3-savings-amount {
  font-size: 52px; font-weight: 900;
  color: var(--orange-dark); letter-spacing: -.03em;
  line-height: 1;
}
.s3-savings-period {
  font-size: 13px; color: var(--orange-dark);
  opacity: .7; margin-top: 3px;
}
.s3-savings-right {
  text-align: right;
  flex-shrink: 0;
}
.s3-proof-line {
  font-size: 12px; color: var(--text-3);
  margin-top: 12px; text-align: center;
}
.s3-proof-line strong { color: var(--text-2); }

/* ──────────────────────────────────────────────────
   STEP 4 · COMPLIANCE
────────────────────────────────────────────────── */
.s4-layout {
  display: grid;
  grid-template-columns: 1fr 260px;
  gap: 12px;
}
.s4-steps-card { padding: 28px; }
.s4-step-row {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  opacity: 0;
  animation: fadeUp .45s cubic-bezier(.22,.68,0,1.1) forwards;
}
.s4-step-left {
  display: flex; flex-direction: column;
  align-items: center; gap: 0; flex-shrink: 0;
}
.s4-circle {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
}
.s4c-done    { background: var(--green-bg);    border: 2px solid var(--green-border); color: var(--green); }
.s4c-active  { background: var(--orange-light); border: 2px solid var(--orange);      color: var(--orange); animation: pulse-dot 2s infinite; }
.s4c-pending { background: #F5F5FA;             border: 2px solid #E0E0F0;             color: var(--text-3); }
.s4-line {
  width: 2px; height: 24px;
  background: var(--border); margin: 4px 0;
  opacity: 0; animation: fadeIn .3s ease forwards;
}
.s4-body { padding: 4px 0 20px; }
.s4-step-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.s4c-done   .s4-step-title { color: var(--text-1); }
.s4c-active-title           { color: var(--orange-dark); }
.s4c-pending-title          { color: var(--text-3); }
.s4-step-desc { font-size: 12px; color: rgb(121, 121, 121); line-height: 1.5; }

.s4-stat-col {
  display: flex; flex-direction: column; gap: 10px;
}
.s4-stat-card {
  padding: 22px;
  background: var(--text-1);
  border-radius: 14px;
  border: none;
}
.s4-stat-card.light {
  background: var(--card);
  border: 1px solid var(--border);
}
.s4-stat-val {
  font-size: 42px; font-weight: 900;
  color: var(--orange); letter-spacing: -.03em;
  line-height: 1; margin-bottom: 5px;
  opacity: 0;
  animation: popIn .6s cubic-bezier(.22,.68,0,1.4) forwards;
}
.s4-stat-card.light .s4-stat-val { color: var(--text-1); }
.s4-stat-lbl { font-size: 12px; color: rgba(255,255,255,.55); font-weight: 500; }
.s4-stat-card.light .s4-stat-lbl { color: var(--text-2); }
.s4-contrast {
  font-size: 11px; color: rgba(255,255,255,.35);
  margin-top: 10px; line-height: 1.4;
  border-top: 1px solid rgba(255,255,255,.1);
  padding-top: 10px;
}

/* ──────────────────────────────────────────────────
   STEP 5 · ATIVAÇÃO
────────────────────────────────────────────────── */
.s5-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--green-bg); color: var(--green);
  border: 1px solid var(--green-border);
  border-radius: 20px; padding: 5px 14px;
  font-size: 11px; font-weight: 700;
  margin-bottom: 16px;
}
.s5-badge-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  animation: pulse-dot 2s infinite;
}
.s5-big {
  font-size: 72px; font-weight: 900;
  color: var(--text-1); letter-spacing: -.04em;
  line-height: 1; margin-bottom: 4px;
}
.s5-big-label {
  font-size: 14px; font-weight: 400; font-family: 'Inter', sans-serif;
  color: var(--text-2); margin-bottom: 0; line-height: 1.4;
}

/* Two-column layout: hero left, integrations right */
.s5-layout {
  display: grid;
  grid-template-columns: 210px 1fr;
  gap: 12px;
  margin-bottom: 12px;
}
.s5-hero-card {
  padding: 26px 22px;
  text-align: center;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.s5-integrations-card {
  padding: 20px 22px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
}
.s5-int-section-title {
  font-size: 10px; font-weight: 700;
  letter-spacing: .07em; text-transform: uppercase;
  color: var(--text-3); margin-bottom: 12px;
}
.s5-int-list { display: flex; flex-direction: column; gap: 7px; }
.s5-int-row {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 12px;
  background: var(--bg);
  border-radius: 9px;
  opacity: 0;
  animation: fadeUp .38s cubic-bezier(.22,.68,0,1.1) forwards;
}
.s5-int-icon {
  width: 34px; height: 34px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 16px;
}
.s5-int-name {
  flex: 1; font-size: 13px; font-weight: 600; color: var(--text-1);
}
.s5-int-status {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700; color: var(--green);
  white-space: nowrap;
}
.s5-int-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); flex-shrink: 0;
}

.s5-trust {
  padding: 18px 22px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: flex;
  justify-content: center;
  gap: 28px;
}
.s5-trust-item {
  display: flex; align-items: center; gap: 7px;
  font-size: 12px; font-weight: 500; color: var(--text-2);
}
.s5-trust-icon { font-size: 14px; }

.s5-cta-card {
  padding: 28px;
  background: linear-gradient(135deg, #1C1208 0%, #2E1808 60%, #3A2010 100%);
  border-radius: 14px;
  border: none;
  text-align: center;
}
.s5-cta-title {
  font-size: 18px; font-weight: 800;
  color: #fff; margin-bottom: 6px;
  letter-spacing: -.01em;
}
.s5-cta-sub {
  font-size: 13px; color: rgba(255,255,255,.55);
  margin-bottom: 22px;
}
.btn-activate {
  display: inline-flex; align-items: center; gap: 9px;
  background: var(--orange); border: none;
  border-radius: 10px; padding: 16px 32px;
  font-family: 'Inter', sans-serif;
  font-size: 15px; font-weight: 700;
  color: #fff; cursor: pointer;
  animation: pulse-cta 2s infinite;
  transition: background .15s, transform .1s;
  width: 100%; justify-content: center;
}
.btn-activate:hover { background: var(--orange-dark); transform: translateY(-1px); }
.s5-no-charge {
  font-size: 12px; color: rgba(255,255,255,.4);
  margin-top: 12px;
}

/* ── AGENCIES STRIP (Step 1) ───────────────────── */
.s1-agencies {
  display: flex; align-items: center; gap: 8px;
  padding: 11px 32px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}
.s1-agencies-label { font-size: 11px; color: var(--text-3); font-weight: 500; white-space: nowrap; }
.s1-agency-chip {
  font-size: 10px; font-weight: 700; letter-spacing: .03em;
  padding: 3px 9px; border-radius: 5px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--text-2);
}
.s1-agencies-more { font-size: 11px; color: var(--text-3); }
.s1-also-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-top: 16px;
}
.s1-also-item {
  padding: 14px 16px;
  background: var(--card);
  border-radius: 10px;
  border: 1px solid var(--border);
  border-left: 3px solid var(--border);
}
.s1-item-red    { border-left-color: var(--red); }
.s1-item-orange { border-left-color: var(--orange); }
.s1-also-val {
  font-size: 28px; font-weight: 900;
  line-height: 1; letter-spacing: -.03em; margin-bottom: 5px;
}
.s1-item-red    .s1-also-val { color: var(--red); }
.s1-item-orange .s1-also-val { color: var(--orange-dark); }
.s1-also-desc { font-size: 12px; color: #797979; font-weight: 500; line-height: 1.4; }

/* ── LIVE INFRACTION DEMO (Step 2) ─────────────── */
.s2-live-card {
  padding: 16px 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
}
.s2-live-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 10px;
}
.s2-live-title { font-size: 12px; font-weight: 700; color: var(--text-1); margin-bottom: 2px; }
.s2-live-sub   { font-size: 12px; color: #797979; }
.s2-live-tag {
  font-size: 9px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
  color: var(--green); background: var(--green-bg); border: 1px solid var(--green-border);
  border-radius: 12px; padding: 3px 9px; white-space: nowrap; margin-top: 2px;
}
.s2-live-row {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px; border-radius: 8px; background: var(--bg);
  margin-bottom: 6px;
  opacity: 0; animation: fadeUp .35s ease forwards;
}
.s2-live-row:last-child { margin-bottom: 0; }
.s2-inf-id { font-size: 12px; font-weight: 700; color: var(--blue); }
.s2-inf-plate {
  font-size: 10px; color: var(--text-3); font-weight: 600;
  background: var(--border); border-radius: 4px; padding: 1px 6px;
}
.s2-inf-spacer { flex: 1; }
.s2-inf-value { font-size: 12px; font-weight: 600; color: var(--text-1); }
.s2-status-badge {
  font-size: 10px; font-weight: 700; padding: 3px 9px;
  border-radius: 12px; white-space: nowrap; margin-left: 4px;
}
.s2-badge-recurso { background: #FFF7ED; color: #C2410C; border: 1px solid #FED7AA; }
.s2-badge-notif   { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }

/* ── WHATSAPP ALERT (Step 4) ───────────────────── */
.s4-wa-card {
  padding: 13px 15px;
  background: #ECFDF5;
  border: 1px solid #BBF7D0;
  border-radius: 12px;
  display: flex; align-items: flex-start; gap: 10px;
}
.s4-wa-icon {
  width: 30px; height: 30px; border-radius: 50%;
  background: #25D366; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; font-size: 14px;
}
.s4-wa-label {
  font-size: 10px; font-weight: 700; color: #15803D;
  text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px;
}
.s4-wa-msg { font-size: 12px; color: var(--text-1); line-height: 1.5; font-weight: 500; }
.s4-wa-time { font-size: 10px; color: var(--text-3); margin-top: 3px; }

/* ──────────────────────────────────────────────────
   STEP · COBERTURA
────────────────────────────────────────────────── */
.s6-card { padding: 0; overflow: hidden; }
.s6-top {
  display: grid;
  grid-template-columns: auto 1fr;
  padding: 28px;
}
.s6-num-col {
  padding-right: 28px;
  margin-right: 28px;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; justify-content: center;
}
.s6-big {
  font-size: 68px; font-weight: 900;
  color: var(--text-1); letter-spacing: -.04em; line-height: 1;
  opacity: 0; animation: popIn .65s cubic-bezier(.22,.68,0,1.4) .28s forwards;
}
.s6-big-lbl {
  font-size: 12px; font-weight: 600; color: var(--text-2);
  margin-top: 8px; line-height: 1.4;
}
.s6-agencies-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 7px;
  align-content: start;
}
.s6-agency {
  padding: 10px 12px;
  background: var(--card);
  border-radius: 8px;
  border: 1px solid var(--border);
  border-left: 2px solid var(--orange-border);
  opacity: 0; animation: fadeUp .35s ease forwards;
}
.s6-agency-name { font-size: 12px; font-weight: 700; color: var(--text-1); margin-bottom: 2px; }
.s6-agency-desc { font-size: 12px; color: rgb(121, 121, 121); line-height: 1.4; }
.s6-coverage {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.s6-cov-item {
  display: flex; flex-direction: column; align-items: flex-start;
  padding: 16px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  opacity: 0; animation: fadeIn .4s ease forwards;
}
.s6-cov-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--orange); margin-bottom: 7px;
}
.s6-cov-label { font-size: 12px; font-weight: 600; color: var(--text-1); }
.s6-cov-sub   { font-size: 12px; color: #797979; margin-top: 2px; }

/* ── STEP 2: NOTIFICATION CYCLING ──────────────── */
.s2-notif-outer { padding: 20px 24px; }
.s2-notif-header {
  display: flex; align-items: center; gap: 7px;
  font-size: 10px; font-weight: 700; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .06em;
  margin-bottom: 14px;
}
.s2-notif-live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #25D366; animation: pulse-dot 2s infinite;
}
.s2-notif-track {
  height: 72px; position: relative; overflow: hidden;
}
.s2-notif-item {
  position: absolute; width: 100%;
  display: flex; align-items: center; gap: 12px;
  padding: 13px 15px;
  background: #F0FDF4;
  border: 1px solid #BBF7D0;
  border-left: 3px solid #25D366;
  border-radius: 10px;
  transition: all .42s cubic-bezier(.22,.68,0,1.1);
  opacity: 0; transform: translateY(18px);
}
.s2-notif-item.active  { opacity: 1; transform: translateY(0); }
.s2-notif-item.exiting { opacity: 0; transform: translateY(-18px); }
.s2-wa-circle {
  width: 32px; height: 32px; border-radius: 50%;
  background: #25D366;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.s2-notif-title { font-size: 12px; font-weight: 700; color: var(--text-1); }
.s2-notif-body  { font-size: 12px; color: var(--text-2); margin-top: 2px; line-height: 1.4; }
.s2-notif-time  { font-size: 10px; color: var(--text-3); margin-left: auto; white-space: nowrap; flex-shrink: 0; }

.s2-stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.s2-stat-pill { padding: 18px 20px; }
.s2-stat-big {
  font-size: 30px; font-weight: 900; color: var(--text-1);
  letter-spacing: -.03em; line-height: 1;
  opacity: 0; animation: popIn .6s cubic-bezier(.22,.68,0,1.4) .35s forwards;
}
.s2-stat-pill:first-child .s2-stat-big { color: var(--green); }
.s2-stat-desc { font-size: 12px; color: #797979; margin-top: 5px; line-height: 1.4; }

/* ── STEP 3 (automação) — hero WhatsApp + feature row ── */
.s2-notif-hero { padding: 28px 30px; }
.s2-notif-hero .s2-notif-header { margin-bottom: 18px; font-size: 11px; }
.s2-notif-hero .s2-notif-track { height: 84px; }
.s2-notif-hero .s2-notif-item { padding: 17px 18px; gap: 14px; }
.s2-notif-hero .s2-wa-circle { width: 42px; height: 42px; font-size: 19px; }
.s2-notif-hero .s2-notif-title { font-size: 14px; }
.s2-feature-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.s2-feature {
  display: flex; align-items: center; gap: 10px;
  padding: 15px 16px;
  font-size: 13px; font-weight: 600; color: var(--text-1);
}
.s2-feat-ic { font-size: 18px; flex-shrink: 0; }
.s2-proof {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 14px 18px;
  background: var(--orange-light);
  border: 1px solid var(--orange-border);
  border-radius: 12px;
  font-size: 13px; color: var(--text-2); line-height: 1.5;
}
.s2-proof strong { color: var(--text-1); font-weight: 700; }
.s2-proof-check {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--orange); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}

/* ── STEP 4 (Sua economia): IPVA/LIC EXTRA ─────── */
.s3-extra-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.s3-extra-pill { padding: 14px 16px; display: flex; align-items: flex-start; gap: 10px; }
.s3-extra-ico  { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
.s3-extra-val  {
  font-size: 20px; font-weight: 900; color: var(--text-1);
  letter-spacing: -.03em; line-height: 1;
  opacity: 0; animation: popIn .55s cubic-bezier(.22,.68,0,1.4) .5s forwards;
}
.s3-extra-desc { font-size: 12px; color: #797979; margin-top: 4px; line-height: 1.4; }

/* ── STEP 6: VEHICLES BADGE ─────────────────────── */
.s5-vehicles-badge { padding: 14px 20px; }
.s5-vehicles-row { display: flex; align-items: baseline; gap: 10px; margin-top: 6px; }
.s5-vehicles-num {
  font-size: 48px; font-weight: 900; color: var(--text-1);
  letter-spacing: -.04em; line-height: 1;
}
.s5-vehicles-label {
  font-size: 13px; color: var(--text-2); font-weight: 500; line-height: 1.4;
}

/* ── STEP 5: BEFORE / AFTER HERO ───────────────── */
.s4-beforeafter {
  padding: 16px 16px;
  background: var(--text-1);
  border-radius: 14px;
  border: none;
  display: flex; flex-direction: column;
  align-items: center; text-align: center; gap: 7px;
}
.s4-ba-before { display: flex; flex-direction: column; align-items: center; opacity: .28; }
.s4-ba-before-val {
  font-size: 18px; font-weight: 800; color: rgba(255,255,255,.6);
  letter-spacing: -.02em; line-height: 1;
  text-decoration: line-through; text-decoration-color: #F87171;
}
.s4-ba-before-lbl { font-size: 9px; color: rgba(255,255,255,.35); margin-top: 3px; }
.s4-ba-divider {
  width: 24px; height: 1px; background: rgba(255,255,255,.1);
}
.s4-ba-arrow {
  font-size: 13px; color: var(--orange);
  margin: -2px 0;
}
.s4-ba-after { display: flex; flex-direction: column; align-items: center; }
.s4-ba-after-val {
  font-size: 38px; font-weight: 900; color: var(--orange);
  letter-spacing: -.04em; line-height: 1;
  opacity: 0;
  animation: popIn .6s cubic-bezier(.22,.68,0,1.4) .3s forwards;
}
.s4-ba-after-lbl { font-size: 10px; color: rgba(255,255,255,.4); margin-top: 4px; line-height: 1.4; }
.s4-ba-tag {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(22,163,74,.15);
  border: 1px solid rgba(22,163,74,.28);
  border-radius: 20px; padding: 4px 9px;
  font-size: 9px; font-weight: 600; color: #4ade80;
  margin-top: 2px;
}
.s4-indic-card {
  padding: 14px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
}
.s4-indic-label { font-size: 9px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
.s4-indic-val   { font-size: 24px; font-weight: 900; color: var(--green); letter-spacing: -.03em; line-height: 1; opacity:0; animation: popIn .6s cubic-bezier(.22,.68,0,1.4) .5s forwards; }
.s4-indic-sub   { font-size: 10px; color: var(--text-3); margin-top: 5px; line-height: 1.4; }

/* ── STEP 5 chip stats ───────────────────────────── */
.s4-buro-row {
  display: grid;
  grid-template-columns: 1.45fr 1fr;
  gap: 10px;
  align-items: stretch;
}
.s4-indicate-card {
  padding: 22px 24px;
  display: flex; flex-direction: column; justify-content: center; gap: 16px;
}
.s4-ind-top { display: flex; align-items: center; gap: 14px; }
.s4-ind-num {
  font-size: 52px; font-weight: 900; color: var(--orange-dark);
  letter-spacing: -.04em; line-height: 1; flex-shrink: 0;
}
.s4-ind-lbl { font-size: 13px; color: var(--text-2); font-weight: 500; line-height: 1.35; }
.s4-ind-risk {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 12px 14px;
  background: var(--red-bg); border: 1px solid var(--red-border);
  border-radius: 10px;
  font-size: 12px; color: var(--red); line-height: 1.45;
}
.s4-ind-risk-ico { flex-shrink: 0; }
.s4-ind-risk strong { font-weight: 800; }
.s4-time-hero {
  padding: 20px 18px;
  background: var(--green-bg);
  border-color: var(--green-border);
  display: flex; flex-direction: column; align-items: center;
  text-align: center; gap: 2px; justify-content: center;
}
.s4-time-before { font-size: 13px; color: #797979; }
.s4-time-before s { color: var(--text-3); }
.s4-time-arrow { color: var(--green); font-size: 15px; margin: 2px 0; }
.s4-time-after {
  font-size: 46px; font-weight: 900; color: var(--green);
  letter-spacing: -.04em; line-height: 1;
}
.s4-time-after-lbl { font-size: 12px; color: #797979; margin-top: 6px; line-height: 1.4; }
.s4-chips-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.s4-chip { padding: 15px 16px; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; }
.s4-chip-before-lbl {
  font-size: 9px; font-weight: 700; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .06em; margin-bottom: 2px;
}
.s4-chip-was {
  font-size: 14px; font-weight: 600; color: var(--text-3);
  margin-bottom: 4px;
}
.s4-chip-val {
  font-size: 26px; font-weight: 900; color: var(--text-1);
  letter-spacing: -.03em; line-height: 1;
  opacity: 0; animation: popIn .55s cubic-bezier(.22,.68,0,1.4) forwards;
}
.s4-chip-lbl { font-size: 12px; color: #797979; margin-top: 5px; line-height: 1.4; }
.s4-chip-savings {
  background: var(--green-bg);
  border-color: var(--green-border);
}
.s4-chip-savings .s4-chip-val { color: var(--green); font-size: 30px; }

/* ── STEP 6: INTEGRATION CHIPS ──────────────────── */
.s5-int-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  margin-top: 10px;
}
.s5-int-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 10px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px;
  opacity: 0; animation: fadeUp .3s ease forwards;
}
.s5-chip-icon {
  width: 28px; height: 28px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
}
.s5-chip-name  { font-size: 11px; font-weight: 600; color: var(--text-1); }
.s5-chip-desc  { font-size: 12px; color: #797979; margin-top: 1px; }
.s5-section-title {
  font-size: 11px; font-weight: 700; color: var(--text-2);
  text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px;
}
.s5-int-value-note {
  font-size: 11px; color: var(--text-3); line-height: 1.5;
  margin-top: 10px; padding-top: 10px;
  border-width: 0px;
  text-align: center;
}

/* ── PHONE MOCKUP ──────────────────────────────── */
.s6-outer {
  display: grid;
  grid-template-columns: 1fr 212px;
  gap: 14px;
  align-items: start;
}
.phone-body {
  background: #1C1C1E;
  border-radius: 30px;
  padding: 6px;
  box-shadow: 0 24px 56px rgba(0,0,0,.28),
              inset 0 0 0 1px rgba(255,255,255,.07);
}
.phone-screen {
  border-radius: 24px;
  overflow: hidden;
  background: #ECE5DD;
}
.phone-notch {
  height: 20px; background: #1C1C1E;
  display: flex; align-items: center; justify-content: center;
}
.phone-notch-pill {
  width: 44px; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,.18);
}
.wa-header {
  background: #075E54;
  padding: 9px 12px;
  display: flex; align-items: center; gap: 8px;
}
.wa-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: #128C7E;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
}
.wa-name   { font-size: 11px; font-weight: 600; color: #fff; line-height: 1.3; }
.wa-online { font-size: 9px; color: rgba(255,255,255,.6); }
.wa-messages {
  padding: 8px 7px;
  display: flex; flex-direction: column; gap: 5px;
  background: #ECE5DD;
}
@keyframes bubblePop {
  from { opacity:0; transform: translateY(10px) scale(.92); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}
.wa-bubble {
  background: #fff;
  border-radius: 6px 12px 12px 6px;
  padding: 7px 9px 4px;
  max-width: 95%;
  box-shadow: 0 1px 2px rgba(0,0,0,.1);
  opacity: 0;
  animation: bubblePop .35s cubic-bezier(.22,.68,0,1.2) forwards;
}
.wa-bubble-row { display: flex; gap: 6px; align-items: flex-start; margin-bottom: 2px; }
.wa-b-icon  { font-size: 12px; flex-shrink: 0; margin-top: 1px; }
.wa-b-title { font-size: 10px; font-weight: 700; color: #075E54; margin-bottom: 2px; }
.wa-b-text  { font-size: 10px; color: #333; line-height: 1.4; }
.wa-bubble-foot {
  display: flex; justify-content: flex-end; align-items: center; gap: 3px;
}
.wa-time  { font-size: 8px; color: #aaa; }
.wa-check { font-size: 9px; color: #53BDEB; }
</style>
</head>
<body>
<div class="shell">

  <!-- TOP NAV -->
  <div class="topnav">
    <div class="brand"><div class="brand-dot"></div>Habilitar.me</div>
    <button class="skip-btn" onclick="goTo(5)">Pular tour →</button>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap" style="margin: 0px 0px 16px">
    <div class="progress-top">
      <span class="progress-label" id="p-label">Passo 1 de 5</span>
      <span class="progress-count" id="p-count">O problema</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="p-fill" style="width:20%"></div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="step-content" id="content"></div>

  <!-- NAV -->
  <div class="nav-bar">
    <button class="btn-back" id="btn-back" onclick="nav(-1)" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M19 12H5M11 6l-6 6 6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Voltar
    </button>
    <button class="btn-next" id="btn-next" onclick="nav(1)">
      <span id="btn-label">Ver como evitar isso</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M5 12h14M13 6l6 6-6 6" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

</div>

<script>
const STEPS = [
  {
    label: 'O problema',
    btnLabel: 'Por que é difícil evitar isso',
    render: step1,
  },
  {
    label: 'A complexidade',
    btnLabel: 'Ver como resolvemos por você',
    render: step6,
  },
  {
    label: 'A automação',
    btnLabel: 'Ver quanto isso economiza',
    render: step2,
  },
  {
    label: 'Economia',
    btnLabel: 'E o tempo? Ver a burocracia',
    render: step3,
  },
  {
    label: 'Burocracia',
    btnLabel: 'Ativar minha frota agora',
    render: step4,
  },
  {
    label: 'Ativação',
    btnLabel: 'Ativar monitoramento da frota',
    render: step5,
    finish: true,
  },
];

let cur = 0;

function updateUI() {
  const s = STEPS[cur];
  document.getElementById('p-label').textContent = `Passo ${cur + 1} de ${STEPS.length}`;
  document.getElementById('p-count').textContent  = s.label;
  document.getElementById('p-fill').style.width   = `${((cur + 1) / STEPS.length) * 100}%`;
  document.getElementById('btn-back').disabled    = cur === 0;
  document.getElementById('btn-label').textContent = s.btnLabel;
  const btn = document.getElementById('btn-next');
  btn.className = 'btn-next' + (s.finish ? ' finish' : '');
}

function goTo(idx, dir = 1) {
  const el = document.getElementById('content');
  el.classList.add('out');
  setTimeout(() => {
    el.classList.remove('out');
    cur = Math.max(0, Math.min(STEPS.length - 1, idx));
    updateUI();
    STEPS[cur].render(el);
    el.classList.add(dir >= 0 ? 'in' : 'in-back');
    setTimeout(() => el.classList.remove('in', 'in-back'), 380);
    setTimeout(afterRender, 60);
  }, 200);
}

function nav(d) {
  const next = cur + d;
  if (next < 0 || next >= STEPS.length) return;
  goTo(next, d);
}

function afterRender() {
  // progress bars for step 3
  const b1 = document.getElementById('bar-without');
  const b2 = document.getElementById('bar-with');
  if (b1) { b1.style.transformOrigin = 'left'; b1.style.animation = 'barFill 1s ease .2s forwards'; }
  if (b2) { b2.style.transformOrigin = 'left'; b2.style.animation = 'barFill 1s ease .4s forwards'; }
}

/* ── STEP RENDERERS ──────────────────────────── */

function step1(el) {
  el.innerHTML = `
    <div class="step-headline a1">Sua frota tem pendências que geram multas, juros e bloqueios.</div>
    <div class="step-sub a2">Coisas que acontecem em silêncio — até virarem custo. Veja o que encontramos na sua frota hoje.</div>

    <div class="card s1-main-card a3">
      <div class="s1-card-top">
        <span class="tag tag-warn">⚠️ Diagnóstico da sua frota</span>
        <div class="s1-number-block">
          <div class="s1-big-num">50</div>
          <div class="s1-num-label">pendências</div>
        </div>
        <div class="s1-also-grid a4">
          <div class="s1-also-item s1-item-red">
            <div class="s1-also-val">42</div>
            <div class="s1-also-desc">multas<br/>detectadas</div>
          </div>
          <div class="s1-also-item s1-item-orange">
            <div class="s1-also-val">5</div>
            <div class="s1-also-desc">licenciamentos<br/>a vencer</div>
          </div>
          <div class="s1-also-item s1-item-orange">
            <div class="s1-also-val">3</div>
            <div class="s1-also-desc">IPVAs<br/>pendentes</div>
          </div>
        </div>
      </div>
      <div class="s1-impact-band a5">
        <div class="s1-impact-num">+R$ 9.480</div>
        <div class="s1-impact-text">é o que sua frota tende a pagar <strong>a mais</strong> com essas pendências — multas sem desconto, juros e encargos por atraso.</div>
      </div>
    </div>
  `;
}

function step6(el) {
  const agencies = [
    { name: 'PRF',     desc: 'Polícia Rodoviária Federal',   d: '.10s' },
    { name: 'DNIT',    desc: 'Infraestrutura de transportes', d: '.17s' },
    { name: 'Detrans', desc: '26 estados cobertos',           d: '.24s' },
    { name: 'ANTT',    desc: 'Transporte terrestre',          d: '.31s' },
    { name: 'Receita', desc: 'IPVA e tributários',            d: '.38s' },
    { name: 'SNE',     desc: 'Indicação de condutor',         d: '.45s' },
  ];
  const agHtml = agencies.map(a => `
    <div class="s6-agency" style="animation-delay:${a.d}">
      <div class="s6-agency-name">${a.name}</div>
      <div class="s6-agency-desc">${a.desc}</div>
    </div>`).join('');

  el.innerHTML = `
    <div class="step-headline a1">Monitoramos sua frota diariamente para reduzir riscos e gastos desnecessários.</div>
    <div class="step-sub a2">Multas, IPVA, licenciamento e indicação de condutor ficam espalhados em diferentes sistemas. Centralizamos e monitoramos tudo para você.</div>

    <div class="card s6-card a3">
      <div class="s6-top">
        <div class="s6-num-col">
          <div class="s6-big">+1.000</div>
          <div class="s6-big-lbl">órgãos autuadores integrados</div>
        </div>
        <div class="s6-agencies-grid">${agHtml}</div>
      </div>
    </div>
  `;
}

function step2(el) {
  const notifs = [
    { icon:'🚨', title:'Multa detectada',      body:'ABC1D23 · PRF · R$ 847,00 · prazo 15 dias', time:'agora'   },
    { icon:'📅', title:'Licenciamento vencendo', body:'DEF4G56 · vence em 5 dias',                time:'há 2 min'},
    { icon:'💰', title:'IPVA 2025 pendente',   body:'GHI7J89 · R$ 1.240,00 · vence em 3 dias',   time:'há 4 min'},
    { icon:'✅', title:'Indicação aceita',      body:'Carlos Mendes assinou o FICI · JKL0M12',    time:'há 6 min'},
  ];

  el.innerHTML = `
    <div class="step-headline a1">Monitoramos sua frota diariamente.</div>
    <div class="step-sub a2">Cada pendência detectada vira um alerta no seu WhatsApp. Em tempo real, sem você precisar se preocupar.</div>

    <div class="card s2-notif-outer s2-notif-hero a3">
      <div class="s2-notif-header">
        <div class="s2-notif-live-dot"></div>
        Alertas em tempo real · via WhatsApp
      </div>
      <div class="s2-notif-track"></div>
    </div>

    <div class="s2-feature-row a4">
      <div class="card s2-feature">
        <span class="s2-feat-ic">⚡</span>
        <span>Em tempo real</span>
      </div>
      <div class="card s2-feature">
        <span class="s2-feat-ic">💬</span>
        <span>Direto no WhatsApp</span>
      </div>
      <div class="card s2-feature">
        <span class="s2-feat-ic">🤖</span>
        <span>Sem ação manual</span>
      </div>
    </div>

    <div class="s2-proof a5">
      <span class="s2-proof-check">✓</span>
      <span>O alerta chega <strong>dias antes do prazo</strong> — tempo de sobra para resolver com desconto.<br/>Já é assim em <strong>+800 veículos monitoradas</strong>.</span>
    </div>
  `;

  let idx = 0;
  const track = el.querySelector('.s2-notif-track');

  function showNext() {
    if (!el.isConnected) { clearInterval(timer); return; }
    const cur = track.querySelector('.active');
    if (cur) {
      cur.classList.remove('active');
      cur.classList.add('exiting');
      setTimeout(() => cur.remove(), 440);
    }
    const n = notifs[idx % notifs.length];
    const div = document.createElement('div');
    div.className = 's2-notif-item';
    div.innerHTML = `
      <div class="s2-wa-circle">💬</div>
      <div style="flex:1;min-width:0">
        <div class="s2-notif-title">${n.icon} ${n.title}</div>
        <div class="s2-notif-body">${n.body}</div>
      </div>
      <div class="s2-notif-time">${n.time}</div>`;
    track.appendChild(div);
    requestAnimationFrame(() => requestAnimationFrame(() => div.classList.add('active')));
    idx++;
  }

  showNext();
  const timer = setInterval(showNext, 2800);
}

function chk(text, delay) {
  return `
    <div class="s2-check-row" style="animation-delay:${delay};">
      <div class="s2-check-circle">
        <svg width="11" height="9" viewBox="0 0 11 9" fill="none" style="animation-delay:${delay}">
          <path d="M1 4.5L4 7.5L10 1" stroke="#16A34A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      ${text}
    </div>`;
}

function step3(el) {
  el.innerHTML = `
    <div class="step-headline a1">Cada alerta gera uma grande economia.</div>
    <div class="step-sub a2">Pagando no prazo, com desconto e no momento certo, o monitoramento se paga sozinho.</div>

    <div class="card s3-hero-savings a3">
      <div class="s3-savings-label">Clientes já economizaram</div>
      <div class="s3-hero-amount pop" style="animation-delay:.25s">R$ 27.621</div>
      <div class="s3-savings-period">em multas, juros e IPVA — só no último período</div>
    </div>

    <div class="s3-compare-title a4" style="text-align: center"><span style="color:#252525">Situação da sua frota este mês: </span></div>
    <div class="s3-comparison a4">
      <div class="s3-col without">
        <div class="s3-col-label">Sem monitoramento</div>
        <div class="s3-amount">R$ 1.369,12</div>
        <div class="s3-desc">Valor cheio, sem desconto,<br/>com prazos perdidos</div>
      </div>
      <div class="s3-col with">
        <div class="s3-col-label">Com Frota Protegida</div>
        <div class="s3-amount">R$ 821,70</div>
        <div class="s3-desc">Com desconto e todos os<br/>prazos garantidos</div>
      </div>
    </div>
  `;
}

function step4(el) {
  const steps = [
    { state:'done',    icon:'✓', title:'Infração recebida',      desc:'A multa é detectada automaticamente e vinculada ao veículo.',       cd:.1,  ld:.22 },
    { state:'done',    icon:'✓', title:'Condutor notificado',    desc:'Notificação enviada automaticamente ao responsável pelo veículo.',   cd:.2,  ld:.32 },
    { state:'active',  icon:'→', title:'Assinatura do condutor', desc:'O condutor assina a indicação no próprio celular — sem papel.',      cd:.3,  ld:.42 },
    { state:'pending', icon:'○', title:'FICI enviado ao DETRAN', desc:'Formulário enviado ao órgão de trânsito automaticamente.',           cd:.4,  ld:null },
  ];

  const stepsHtml = steps.map(s => {
    const circleClass = `s4-circle s4c-${s.state}`;
    const titleClass  = s.state === 'active'  ? 's4-step-title s4c-active-title'
                      : s.state === 'pending' ? 's4-step-title s4c-pending-title'
                      : 's4-step-title';
    const line = s.ld !== null
      ? `<div class="s4-line" style="animation-delay:${s.ld}s;"></div>` : '';
    return `
      <div class="s4-step-row" style="animation-delay:${s.cd}s;">
        <div class="s4-step-left">
          <div class="${circleClass}">${s.icon}</div>
          ${line}
        </div>
        <div class="s4-body">
          <div class="${titleClass}">${s.title}</div>
          <div class="s4-step-desc">${s.desc}</div>
        </div>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="step-headline a1">Indique o condutor e evite multas. Sem complicação.</div>
    <div class="step-sub a2">Identificamos a infração, notificamos o motorista e enviamos a indicação automaticamente ao órgão responsável.</div>

    <div class="s4-buro-row a3">
      <div class="card s4-indicate-card">
        <div class="s4-ind-top">
          <div class="s4-ind-num">7</div>
          <div class="s4-ind-lbl">multas ativas podem ser<br/>indicadas agora</div>
        </div>
        <div class="s4-ind-risk">
          <span class="s4-ind-risk-ico">⚠️</span>
          <span><strong>R$ 9.884</strong> em multas vão para a empresa se a indicação não for feita no prazo.</span>
        </div>
      </div>
      <div class="card s4-time-hero">
        <div class="s4-time-before">Semanas de burocracia</div>
        <div class="s4-time-arrow">↓</div>
        <div class="s4-time-after pop" style="animation-delay:.25s">2 dias</div>
        <div class="s4-time-after-lbl">100% digital, do alerta<br/>à indicação assinada</div>
      </div>
    </div>

    <div class="card s4-steps-card a4">
      <div class="s4-steps">${stepsHtml}</div>
    </div>
  `;
}

function step5(el) {
  const intChips = [
    { icon:'🏛️', bg:'#EEF2FF', name:'Gov.br',          desc:'Órgãos federais',            d:'.08s' },
    { icon:'📋', bg:'#FFF5EF', name:'SNE',              desc:'Indicação de condutor',       d:'.16s' },
    { icon:'🚗', bg:'#F0FDF4', name:'Detrans',          desc:'Multas e licenciamentos',     d:'.24s' },
    { icon:'💰', bg:'#FEF9C3', name:'Receita Federal',  desc:'IPVA e tributários',          d:'.32s' },
    { icon:'📱', bg:'#F5F3FF', name:'CNH Digital',      desc:'CNH dos motoristas',          d:'.40s' },
    { icon:'🔐', bg:'#FFF1F2', name:'e-CNPJ A1',        desc:'Assinaturas digitais',        d:'.48s' },
  ];
  const chipsHtml = intChips.map(c => `
    <div class="s5-int-chip" style="animation-delay:${c.d}">
      <div class="s5-chip-icon" style="background:${c.bg}">${c.icon}</div>
      <div>
        <div class="s5-chip-name">${c.name}</div>
      </div>
    </div>`).join('');

  el.innerHTML = `
    <div class="step-headline a1">Em menos de 2 minutos, sua frota começa a ser monitorada.</div>
    <div class="step-sub a2">Ative agora e tudo o que você viu passa a trabalhar pela sua frota — no automático, 24h por dia.</div>

    <div class="s5-layout a3">
      <div class="s5-hero-card">
        <div class="s5-badge"><div class="s5-badge-dot"></div>Monitoramento ativo</div>
        <div class="s5-big pop" style="animation-delay:.2s">83</div>
        <div class="s5-big-label">veículos protegidos<br/>e monitorados 24h/dia</div>
      </div>
      <div class="s5-integrations-card">
        <div class="s5-section-title">Integrações que mantêm sua frota e empresa seguras</div>
        <div class="s5-int-grid">${chipsHtml}</div>
        <div class="s5-int-value-note">Todos os dados atualizados diariamente — automático, sem ação manual.</div>
      </div>
    </div>

    <div class="s5-trust a5">
      <div class="s5-trust-item"><span class="s5-trust-icon">🔒</span>Teste gratuito de 7 dias</div>
      <div class="s5-trust-item"><span class="s5-trust-icon">✕</span>Sem cobrança hoje</div>
      <div class="s5-trust-item"><span class="s5-trust-icon">↩</span>Cancele quando quiser</div>
    </div>
  `;
}

// ── INIT ────────────────────────────────────────
updateUI();
STEPS[0].render(document.getElementById('content'));
document.getElementById('content').classList.add('in');
setTimeout(() => document.getElementById('content').classList.remove('in'), 380);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'Enter') nav(1);
  if (e.key === 'ArrowLeft')  nav(-1);
});
</script>
</body>
